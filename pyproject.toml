[project]
name = "tracefork-spike"
version = "0.0.0"
description = "Spike 0 for tracefork: prove bit-exact record/replay of an Anthropic-SDK agent run within a declared determinism boundary."
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.40",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tracefork_spike"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
