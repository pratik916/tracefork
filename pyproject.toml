[project]
name = "tracefork"
version = "0.1.0"
description = "Time-travel debugger for AI agents: bit-exact record/replay, fork any step, causal blame with confidence intervals."
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.40",
    "zstandard>=0.22",
    "typer>=0.12",
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5",
    "ruff>=0.6",
    "mypy>=1.11",
]

[project.scripts]
tracefork = "tracefork.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tracefork_spike", "src/tracefork"]

# Ship the single-file web UI inside the package so `report` and `serve` work from
# an installed wheel, not only from an editable/source checkout.
[tool.hatch.build.targets.wheel.force-include]
"web/report.html" = "tracefork/web/report.html"

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]

[tool.mypy]
python_version = "3.12"
files = ["src/tracefork"]
ignore_missing_imports = true
no_implicit_optional = true
warn_unused_ignores = true

[tool.coverage.run]
source = ["src/tracefork", "src/tracefork_spike"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 75
