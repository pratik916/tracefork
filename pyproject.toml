[project]
name = "tracefork"
version = "0.1.0"
description = "Time-travel debugger for AI agents: bit-exact record/replay, fork any step, causal blame with confidence intervals."
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.40",
    "zstandard>=0.22",
    "typer>=0.12",
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[project.scripts]
tracefork = "tracefork.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tracefork_spike", "src/tracefork"]

# Ship the single-file web UI inside the package so `report` and `serve` work from
# an installed wheel, not only from an editable/source checkout.
[tool.hatch.build.targets.wheel.force-include]
"web/report.html" = "tracefork/web/report.html"

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
asyncio_mode = "auto"
