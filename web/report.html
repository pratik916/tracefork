<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tracefork — time-travel debugger</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #6e7681; --green: #3fb950;
    --blue: #58a6ff; --orange: #f0883e; --purple: #d2a8ff;
    --red: #f85149; --yellow: #e3b341;
  }
  body { background: var(--bg); color: var(--text); font-family: ui-monospace, monospace; font-size: 13px; }
  header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 15px; color: var(--green); }
  header .run-meta { color: var(--muted); font-size: 11px; }
  .layout { display: grid; grid-template-columns: 280px 1fr 320px 260px; height: calc(100vh - 45px); }
  .panel { border-right: 1px solid var(--border); overflow-y: auto; }
  .panel:last-child { border-right: none; }
  .panel-header { padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
                  font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  /* Panel 1 — Timeline */
  .exchange-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .exchange-item:hover, .exchange-item.active { background: var(--surface); }
  .exchange-item .step { font-size: 10px; color: var(--muted); }
  .exchange-item .role { font-size: 12px; margin: 3px 0; }
  .role-user { color: var(--blue); }
  .role-assistant { color: var(--purple); }
  .role-tool { color: var(--orange); }
  .exchange-item .preview { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .blame-badge { float: right; font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #1a3a1a; color: var(--green); }
  .blame-badge.high { background: #3a1a1a; color: var(--red); }

  /* Panel 2 — Detail */
  .detail-empty { padding: 40px; color: var(--muted); text-align: center; }
  .detail-section { padding: 14px; border-bottom: 1px solid var(--border); }
  .detail-section h3 { font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
  pre { background: var(--surface); padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 11px; line-height: 1.6; }
  .key { color: var(--blue); }
  .string { color: var(--green); }
  .number { color: var(--yellow); }

  /* Panel 3 — Blame */
  .blame-empty { padding: 40px; color: var(--muted); text-align: center; }
  .blame-row { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .blame-rank { width: 20px; color: var(--muted); font-size: 11px; }
  .blame-info { flex: 1; }
  .blame-step { font-size: 12px; }
  .blame-ci { font-size: 10px; color: var(--muted); }
  .blame-bar-wrap { width: 80px; }
  .blame-bar { height: 6px; background: var(--green); border-radius: 3px; }
  .blame-bar.decisive { background: var(--red); }
  .blame-rate { font-size: 11px; text-align: right; min-width: 50px; }
  .blame-rate.decisive { color: var(--red); font-weight: bold; }
  .blame-header-row { padding: 6px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
                       display: flex; gap: 8px; font-size: 10px; color: var(--muted); }

  .loading { padding: 40px; text-align: center; color: var(--muted); }
  .error { padding: 20px; color: var(--red); }
  .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-left: 6px; }
  .tag-live { background: #1a3a1a; color: var(--green); }
  .tag-static { background: #1a2a3a; color: var(--blue); }

  /* Replay-report / divergence diagnostics */
  .tag-pass { background: #1a3a1a; color: var(--green); cursor: default; }
  .tag-fail { background: #3a1a1a; color: var(--red); cursor: pointer; }
  .tag-fail:hover { text-decoration: underline; }

  /* Boundary/provenance/redaction trust badges (see renderProvenanceBadges) --
     verified boundary reuses .tag-pass above; forensic-only and redacted-content
     are distinct warning tags, never a pass/fail input. */
  .tag-warn { background: #3a3010; color: var(--yellow); cursor: default; }
  .tag-redacted { background: #3a2a10; color: var(--orange); cursor: default; }
  .nav-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text);
             font-family: inherit; font-size: 11px; padding: 3px 8px; cursor: pointer; border-radius: 3px; }
  .nav-btn:hover { border-color: var(--blue); }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }
  .detail-nav { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px;
                border-bottom: 1px solid var(--border); background: var(--surface); }
  .diverge-note { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
  .diverge-note.real { background: #3a1a1a; color: var(--red); }
  .diverge-note.tolerated { background: #3a3010; color: var(--yellow); }
  .diff-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
  .diff-table th, .diff-table td { border: 1px solid var(--border); padding: 4px 6px; text-align: left; vertical-align: top; word-break: break-all; }
  .diff-table th { background: var(--surface); color: var(--muted); font-weight: normal; }
  .diff-path { color: var(--blue); font-family: ui-monospace, monospace; }
  .diff-recorded { color: var(--red); }
  .diff-live { color: var(--green); }
  .trust-flags { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .trust-warn { color: var(--yellow); }

  /* Panel 4 — Fork Tree (tracefork-bge.15) */
  .forktree-empty { padding: 40px; color: var(--muted); text-align: center; }
  .forktree-svg { display: block; margin: 12px auto; }
  .forktree-node { fill: var(--blue); cursor: pointer; }
  .forktree-node:hover { fill: var(--orange); }
  .forktree-node.forktree-root { fill: var(--green); cursor: default; }
  .forktree-edge { stroke: var(--border); stroke-width: 2; }
  .forktree-label { fill: var(--text); font-size: 11px; font-family: ui-monospace, monospace; }
  .forktree-root-label { fill: var(--green); }
  .forktree-desc { fill: var(--muted); font-size: 10px; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<header>
  <h1>tracefork</h1>
  <span class="run-meta" id="run-meta">loading…</span>
  <span class="tag" id="mode-tag"></span>
  <span class="tag" id="replay-tag" onclick="jumpToDivergence()" title="click to rewind to the diverging step"></span>
  <span class="tag" id="boundary-tag"></span>
  <span class="tag" id="redacted-tag"></span>
</header>
<div class="layout">
  <div class="panel" id="timeline-panel">
    <div class="panel-header">Timeline</div>
    <div id="timeline-content"><div class="loading">loading…</div></div>
  </div>
  <div class="panel" id="detail-panel">
    <div class="panel-header">Exchange Detail</div>
    <div id="detail-content"><div class="detail-empty">← select an exchange</div></div>
  </div>
  <div class="panel" id="blame-panel">
    <div class="panel-header">Blame</div>
    <div id="blame-content"><div class="blame-empty">run tracefork blame to populate</div></div>
  </div>
  <div class="panel" id="forktree-panel">
    <div class="panel-header">Fork Tree</div>
    <div id="forktree-content"><div class="loading">loading…</div></div>
  </div>
</div>

<script>
// ── data source ───────────────────────────────────────────────────────────
let DATA = null;

async function loadData() {
  if (window.__TRACEFORK_DATA__) {
    // static mode: data injected at report-generation time
    document.getElementById('mode-tag').textContent = 'static';
    document.getElementById('mode-tag').className = 'tag tag-static';
    return window.__TRACEFORK_DATA__;
  }
  if (window.__TRACEFORK_SERVER_URL__ !== undefined) {
    // live mode: fetch from the serving origin (empty base → same-origin, any port)
    document.getElementById('mode-tag').textContent = 'live';
    document.getElementById('mode-tag').className = 'tag tag-live';
    const url = window.__TRACEFORK_SERVER_URL__;
    const runId = new URLSearchParams(location.search).get('run_id');
    const resp = await fetch(`${url}/api/run/${runId}`);
    if (!resp.ok) throw new Error(`server ${resp.status}: run not found`);
    return resp.json();
  }
  throw new Error('No data source configured');
}

// ── render ─────────────────────────────────────────────────────────────────
function renderTimeline(data) {
  const blame = data.blame || {};
  const divergence = (data.replay && data.replay.divergence) || null;
  const html = data.exchanges.map((ex, i) => {
    const flipRate = blame[i] ? blame[i].flip_rate : null;
    const isDecisive = flipRate !== null && flipRate >= 0.7;
    const badgeHtml = flipRate !== null
      ? `<span class="blame-badge${isDecisive ? ' high' : ''}">${Math.round(flipRate*100)}%</span>`
      : '';
    const divergeHtml = divergence && divergence.step_index === i
      ? `<span class="blame-badge high" title="replay diverged here">⚡ diverged</span>`
      : '';
    const roleClass = ex.role === 'user' ? 'role-user' : ex.role === 'assistant' ? 'role-assistant' : 'role-tool';
    return `<div class="exchange-item" data-i="${i}" onclick="selectExchange(${i})">
      ${divergeHtml}${badgeHtml}
      <div class="step">exchange ${i}</div>
      <div class="role ${roleClass}">${escape(ex.role || 'unknown')}</div>
      <div class="preview">${escape(ex.preview || '')}</div>
    </div>`;
  }).join('');
  document.getElementById('timeline-content').innerHTML = html;
}

function renderReplayBadge(data) {
  const el = document.getElementById('replay-tag');
  const replay = data.replay;
  if (!replay || Object.keys(replay).length === 0) {
    el.textContent = '';
    el.className = 'tag';
    return;
  }
  if (replay.bit_exact) {
    el.textContent = `replay ${replay.matched}/${replay.total} bit-exact`;
    el.className = 'tag tag-pass';
  } else {
    const step = replay.divergence ? replay.divergence.step_index : '?';
    el.textContent = `replay diverged @ step ${step}`;
    el.className = 'tag tag-fail';
  }
}

// Boundary string values mirror `constants.py`'s BOUNDARY_V1 /
// OTEL_INGESTED_BOUNDARY / PROXY_BOUNDARY -- keep in sync if those are ever
// renamed. SLSA-style leveled trust (not a single verified/unverified
// boolean): a single-process tape is bit-exact-replay-verified; an
// OTel-ingested or proxy-recorded tape is forensic-only (documented
// non-bit-exact, see each module's docstring). `content_redacted` is a
// SEPARATE, orthogonal warning -- forensic-only, never fed into `digest()`,
// never a pass/fail input.
const _VERIFIED_BOUNDARY = 'single-process-asyncio-v1';

function renderProvenanceBadges(data) {
  const boundaryEl = document.getElementById('boundary-tag');
  const boundary = data.boundary || '';
  if (boundary === _VERIFIED_BOUNDARY) {
    boundaryEl.textContent = 'verified boundary';
    boundaryEl.className = 'tag tag-pass';
    boundaryEl.title = 'single-process, bit-exact-replay-verified determinism boundary';
  } else if (boundary) {
    boundaryEl.textContent = `forensic-only boundary (${escape(boundary)})`;
    boundaryEl.className = 'tag tag-warn';
    boundaryEl.title = 'recorded outside the full determinism boundary — not guaranteed bit-exact replay';
  } else {
    boundaryEl.textContent = '';
    boundaryEl.className = 'tag';
    boundaryEl.title = '';
  }

  const redactedEl = document.getElementById('redacted-tag');
  if (data.content_redacted) {
    redactedEl.textContent = 'content redacted';
    redactedEl.className = 'tag tag-redacted';
    redactedEl.title = 'forensic-only: redacted message content is not guaranteed bit-exact-replayable';
  } else {
    redactedEl.textContent = '';
    redactedEl.className = 'tag';
    redactedEl.title = '';
  }
}

function jumpToDivergence() {
  const divergence = DATA && DATA.replay && DATA.replay.divergence;
  if (divergence) selectExchange(divergence.step_index);
}

function renderBlame(data) {
  const blame = data.blame;
  if (!blame || Object.keys(blame).length === 0) return;
  const entries = Object.entries(blame).sort((a, b) => b[1].flip_rate - a[1].flip_rate);
  const headerHtml = `<div class="blame-header-row">
    <span style="width:20px">rank</span>
    <span style="flex:1">step</span>
    <span style="width:80px">bar</span>
    <span style="min-width:50px;text-align:right">flip</span>
  </div>`;
  const rowsHtml = entries.map(([step, info], rank) => {
    const rate = info.flip_rate;
    const isDecisive = rate >= 0.7;
    const pct = Math.round(rate * 100);
    const trustHtml = renderTrustFlags(info);
    return `<div class="blame-row">
      <span class="blame-rank">${rank+1}</span>
      <div class="blame-info">
        <div class="blame-step">step-${step}</div>
        <div class="blame-ci">95% CI [${info.ci_lo.toFixed(2)}, ${info.ci_hi.toFixed(2)}]</div>
        ${trustHtml}
      </div>
      <div class="blame-bar-wrap"><div class="blame-bar${isDecisive ? ' decisive' : ''}" style="width:${pct}%"></div></div>
      <div class="blame-rate${isDecisive ? ' decisive' : ''}">${pct}%</div>
    </div>`;
  }).join('');
  document.getElementById('blame-content').innerHTML = headerHtml + rowsHtml;
}

function renderTrustFlags(info) {
  // Additive: older blame dicts (pre-trust-flags) only carry flip_rate/ci_lo/ci_hi.
  if (typeof info.divergence_rate !== 'number') return '';
  const divPct = Math.round(info.divergence_rate * 100);
  const undef = info.undefined !== undefined ? info.undefined : 0;
  const trials = info.trials !== undefined ? info.trials : (info.valid_trials || 0) + undef;
  const warn = info.trustworthy === false ? ' <span class="trust-warn">⚠ low-confidence</span>' : '';
  return `<div class="trust-flags">divergence ${divPct}% · undefined ${undef}/${trials}${warn}</div>`;
}

let _selected = -1;
function selectExchange(i) {
  if (!DATA || i < 0 || i >= DATA.exchanges.length) return;
  if (_selected >= 0) {
    document.querySelector(`[data-i="${_selected}"]`)?.classList.remove('active');
  }
  _selected = i;
  document.querySelector(`[data-i="${i}"]`)?.classList.add('active');
  const ex = DATA.exchanges[i];
  const reqJson = syntaxHighlight(JSON.stringify(ex.request || {}, null, 2));
  const respJson = syntaxHighlight(JSON.stringify(ex.response_preview || {}, null, 2));
  // Rewind-to-step: prev/next step through recorded exchanges from here.
  const navHtml = `<div class="detail-nav">
      <button class="nav-btn" onclick="selectExchange(${i - 1})" ${i <= 0 ? 'disabled' : ''}>‹ prev</button>
      <span>exchange ${i} / ${DATA.exchanges.length - 1}</span>
      <button class="nav-btn" onclick="selectExchange(${i + 1})" ${i >= DATA.exchanges.length - 1 ? 'disabled' : ''}>next ›</button>
    </div>`;
  document.getElementById('detail-content').innerHTML = navHtml + `
    <div class="detail-section">
      <h3>Request (exchange ${i})</h3>
      <pre>${reqJson}</pre>
    </div>
    <div class="detail-section">
      <h3>Response</h3>
      <pre>${respJson}</pre>
    </div>` + renderDivergencePanel(i);
}

function renderDivergencePanel(i) {
  const divergence = (DATA.replay && DATA.replay.divergence) || null;
  if (!divergence || divergence.step_index !== i) return '';
  const diag = divergence.diag;
  let body = `<p>${escape(divergence.message || '')}</p>`;
  if (diag) {
    const noteClass = diag.is_real_divergence ? 'real' : 'tolerated';
    const noteText = diag.is_real_divergence ? 'real divergence' : 'tolerated / non-semantic';
    body += `<p><span class="diverge-note ${noteClass}">${noteText}</span> · matcher '${escape(diag.matcher_name)}'</p>`;
    if (diag.normalized_fields && diag.normalized_fields.length) {
      body += `<p class="trust-flags">normalized (excluded from comparison): ${diag.normalized_fields.map(escape).join(', ')}</p>`;
    }
    if (diag.field_diffs && diag.field_diffs.length) {
      const rows = diag.field_diffs.map(d => `<tr>
          <td class="diff-path">${escape(d.path)}</td>
          <td class="diff-recorded">${escape(JSON.stringify(d.recorded))}</td>
          <td class="diff-live">${escape(JSON.stringify(d.live))}</td>
        </tr>`).join('');
      body += `<table class="diff-table"><thead><tr><th>field</th><th>recorded</th><th>live</th></tr></thead><tbody>${rows}</tbody></table>`;
    } else {
      body += `<p class="trust-flags">no field-level diff available</p>`;
    }
  }
  return `<div class="detail-section">
      <h3>Divergence Diagnostic</h3>
      ${body}
    </div>`;
}

function syntaxHighlight(json) {
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
      m => {
        let cls = 'number';
        if (/^"/.test(m)) cls = /:$/.test(m) ? 'key' : 'string';
        return `<span class="${cls}">${m}</span>`;
      });
}

function escape(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Same escaping as `escape()` plus `"` — required when the value lands inside
// a double-quoted HTML attribute (e.g. `data-branch-id="..."`) rather than
// text content, so a branch_id/digest containing a quote can't break out of
// the attribute.
function escapeAttr(s) { return escape(String(s)).replace(/"/g, '&quot;'); }

// ── Panel 4 — Fork Tree (tracefork-bge.15) ──────────────────────────────────
// Git-graph-style row layout: one row per branch, ranked by divergence_step,
// each edging straight up to the root run. `branches` is the flat summary
// `TapeStore.list_branches` returns (branch_id/divergence_step/mutation_desc/
// created_at/branch_digest) -- a true DAG (parent_id + extra caused_by edges,
// multi-level fork-of-fork chains) is future scope; this data shape is one
// run's direct branches, so a single-level star is the honest rendering of
// what's actually available today.
function renderForkTree(data) {
  const el = document.getElementById('forktree-content');
  const branches = data.branches || [];
  if (branches.length === 0) {
    el.innerHTML = '<div class="forktree-empty">no forked branches</div>';
    return;
  }
  const sorted = [...branches].sort((a, b) => (a.divergence_step ?? 0) - (b.divergence_step ?? 0));
  const rowH = 48;
  const width = 240;
  const rootX = 26, rootY = 22;
  const height = rootY + rowH * sorted.length + 24;
  let svg = `<svg width="${width}" height="${height}" class="forktree-svg">`;
  svg += `<circle cx="${rootX}" cy="${rootY}" r="6" class="forktree-node forktree-root"></circle>`;
  svg += `<text x="${rootX + 14}" y="${rootY + 4}" class="forktree-label forktree-root-label">run</text>`;
  sorted.forEach((b, i) => {
    const y = rootY + rowH * (i + 1);
    const digestShort = (b.branch_digest || '').slice(0, 8);
    const step = b.divergence_step !== undefined && b.divergence_step !== null ? b.divergence_step : '?';
    svg += `<line x1="${rootX}" y1="${rootY}" x2="${rootX}" y2="${y}" class="forktree-edge"></line>`;
    svg += `<circle cx="${rootX}" cy="${y}" r="5" class="forktree-node" data-branch-id="${escapeAttr(b.branch_id)}"></circle>`;
    svg += `<text x="${rootX + 14}" y="${y - 6}" class="forktree-label">step ${escape(String(step))}${digestShort ? ' · ' + escape(digestShort) : ''}</text>`;
    svg += `<text x="${rootX + 14}" y="${y + 10}" class="forktree-desc">${escape(b.mutation_desc || '')}</text>`;
  });
  svg += '</svg>';
  el.innerHTML = svg;
  el.querySelectorAll('[data-branch-id]').forEach(node => {
    node.addEventListener('click', () => onForkNodeClick(node.getAttribute('data-branch-id')));
  });
}

function onForkNodeClick(branchId) {
  const detailEl = document.getElementById('detail-content');
  if (window.__TRACEFORK_SERVER_URL__ === undefined) {
    // Static mode: no server to fetch the branch's delta tape from -- an
    // honest 'live-mode-only' affordance rather than a silently-empty click.
    detailEl.innerHTML = `<div class="detail-empty">branch ${escape(branchId)} — live-mode-only: open via 'tracefork serve' to inspect its delta tape</div>`;
    return;
  }
  const url = window.__TRACEFORK_SERVER_URL__;
  fetch(`${url}/api/branch/${branchId}`)
    .then(resp => {
      if (!resp.ok) throw new Error(`server ${resp.status}: branch not found`);
      return resp.json();
    })
    .then(branch => {
      detailEl.innerHTML = `<div class="detail-section">
        <h3>Branch ${escape(branchId)}</h3>
        <p>diverged at step ${escape(String(branch.divergence_step))}</p>
        <p>${escape(branch.mutation_desc || '')}</p>
        <p class="trust-flags">digest ${escape(branch.branch_digest || '')}</p>
      </div>`;
    })
    .catch(e => {
      detailEl.innerHTML = `<div class="error">${escape(e.message)}</div>`;
    });
}

// ── boot ───────────────────────────────────────────────────────────────────
(async () => {
  try {
    DATA = await loadData();
    document.getElementById('run-meta').textContent =
      `${DATA.agent_name || 'unknown agent'} · ${DATA.exchanges.length} exchanges · ${DATA.created_at || ''}`;
    renderTimeline(DATA);
    renderBlame(DATA);
    renderReplayBadge(DATA);
    renderProvenanceBadges(DATA);
    renderForkTree(DATA);
    if (DATA.exchanges.length > 0) selectExchange(0);
  } catch (e) {
    document.getElementById('timeline-content').innerHTML = `<div class="error">${e.message}</div>`;
  }
})();
</script>
</body>
</html>
