name: Mutation testing

# Nightly, informational-only mutation-testing pass over the four
# proof-bearing modules (transport/tape/matcher/blame) via mutmut — see
# scripts/mutation_summary.py's module docstring for the full rationale.
#
# Deliberately triggers ONLY on a schedule + manual dispatch, never on
# `push`/`pull_request`: this job is structurally incapable of blocking a
# merge. `continue-on-error: true` on the job is belt-and-suspenders on top
# of that (and on top of scripts/mutation.sh / scripts/mutation_summary.py
# each already exiting 0 by design).

on:
  schedule:
    - cron: "0 7 * * *" # nightly, 07:00 UTC
  workflow_dispatch:

jobs:
  mutation:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev --extra mutation
      - name: Seed coverage data for mutmut --use-coverage
        run: uv run pytest -q --cov
      - name: Run mutmut over transport/tape/matcher/blame
        run: uv run mutmut run --use-coverage || true
      - name: Export mutmut results as JUnit XML
        run: uv run mutmut junitxml > mutmut-junit.xml
      - name: Summarize mutation results
        run: uv run python scripts/mutation_summary.py --junit-xml mutmut-junit.xml || true
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: |
            mutmut-junit.xml
            .mutmut-cache
          if-no-files-found: warn
